<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff" />
      <stop offset="100%" stop-color="#7b2cbf" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <g transform="translate(100, 100)">
    <!-- Outer Hexagon -->
    <polygon points="0,-80 69.28,-40 69.28,40 0,80 -69.28,40 -69.28,-40" 
             fill="none" 
             stroke="url(#logo-gradient)" 
             stroke-width="8" 
             filter="url(#glow)"/>
             
    <!-- Inner 3D Cube / A-R shape -->
    <path d="M 0,-45 L 38.97,-22.5 L 38.97,22.5 L 0,45 L -38.97,22.5 L -38.97,-22.5 Z" 
          fill="rgba(0, 210, 255, 0.2)" 
          stroke="url(#logo-gradient)" 
          stroke-width="5"/>
          
    <path d="M 0,-45 L 0,0 L 38.97,22.5" 
          fill="none" 
          stroke="url(#logo-gradient)" 
          stroke-width="5"/>
          
    <path d="M 0,0 L -38.97,22.5" 
          fill="none" 
          stroke="url(#logo-gradient)" 
          stroke-width="5"/>
          
    <!-- Core glowing orb -->
    <circle cx="0" cy="0" r="10" fill="url(#logo-gradient)" filter="url(#glow)"/>
  </g>
</svg>
